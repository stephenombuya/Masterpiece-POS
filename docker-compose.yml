# ============================================================
#  RetailPOS — Docker Compose
#  Starts PostgreSQL + Spring Boot backend in one command
# ============================================================

version: '3.9'

services:

  # ---- PostgreSQL ----
  postgres:
    image: postgres:15-alpine
    container_name: pos_db
    restart: unless-stopped
    environment:
      POSTGRES_DB:       pos_db
      POSTGRES_USER:     pos_user
      POSTGRES_PASSWORD: pos_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./web-backend/src/main/resources/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pos_user -d pos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Spring Boot Backend ----
  backend:
    build:
      context: ./web-backend
      dockerfile: Dockerfile
    container_name: pos_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_USERNAME:    pos_user
      DB_PASSWORD:    pos_password
      JWT_SECRET:     "replace-this-with-a-secure-256-bit-secret-in-production-env"
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/pos_db
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/api/v1/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres_data:
